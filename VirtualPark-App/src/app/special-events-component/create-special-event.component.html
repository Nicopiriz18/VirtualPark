
    <section class="form-container">
      <mat-card class="form-paper">
        <mat-card-header>
          <mat-card-title>Crear evento especial</mat-card-title>
          <mat-card-subtitle>
            Define los detalles del evento para ponerlo a disposición del público.
          </mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <form [formGroup]="form" class="form-grid" (ngSubmit)="onSubmit()">
            <mat-form-field appearance="outline">
              <mat-label>Nombre</mat-label>
              <input matInput formControlName="name" />
              <mat-error *ngIf="f['name'].invalid && f['name'].touched">
                Ingresa un nombre válido.
              </mat-error>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Fecha</mat-label>
              <input matInput type="date" formControlName="date" />
              <mat-error *ngIf="f['date'].invalid && f['date'].touched">
                Selecciona una fecha válida.
              </mat-error>
            </mat-form-field>

            <div class="form-grid form-grid--two">
              <mat-form-field appearance="outline">
                <mat-label>Capacidad máxima</mat-label>
                <input matInput type="number" min="1" formControlName="maxCapacity" />
                <mat-error *ngIf="f['maxCapacity'].invalid && f['maxCapacity'].touched">
                  Debe ser mayor a cero.
                </mat-error>
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Costo adicional (USD)</mat-label>
                <input matInput type="number" min="0" formControlName="additionalCost" />
                <mat-error *ngIf="f['additionalCost'].invalid && f['additionalCost'].touched">
                  Ingresa un valor válido.
                </mat-error>
              </mat-form-field>
            </div>

            <div class="form-actions">
              <button mat-button type="button" (click)="goBack()" [disabled]="isSaving()">
                Cancelar
              </button>
              <button
                mat-flat-button
                color="primary"
                type="submit"
                [disabled]="form.invalid || isSaving()"
              >
                {{ isSaving() ? 'Guardando...' : 'Crear evento' }}
              </button>
            </div>
          </form>
        </mat-card-content>
      </mat-card>
    </section>
