
    <section class="max-w-4xl mx-auto p-6 bg-white rounded-xl shadow">
      <header class="flex items-center justify-between mb-4">
        <h2 class="text-2xl font-semibold text-slate-800">Historial de canjes</h2>
        <button
          type="button"
          class="px-4 py-2 rounded-md bg-slate-100 text-slate-700 font-medium hover:bg-slate-200 transition"
          (click)="load()"
          [disabled]="isLoading()"
        >
          {{ isLoading() ? 'Cargando...' : 'Refrescar' }}
        </button>
      </header>

      <p *ngIf="!redemptions().length && !isLoading()" class="text-sm text-slate-600">
        No hay canjes registrados.
      </p>

      <div *ngIf="redemptions().length" class="overflow-x-auto">
        <table class="w-full border text-sm text-slate-700">
          <thead class="bg-slate-50">
            <tr>
              <th class="px-3 py-2 text-left">Fecha</th>
              <th class="px-3 py-2 text-left">Reward</th>
              <th class="px-3 py-2 text-left">Puntos</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let r of redemptions()" class="border-t">
              <td class="px-3 py-2">{{ r.date | date: 'short' }}</td>
              <td class="px-3 py-2">{{ r.rewardId }}</td>
              <td class="px-3 py-2">{{ r.pointsSpent }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
