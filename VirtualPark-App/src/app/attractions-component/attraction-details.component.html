
    <section class="mx-auto max-w-3xl space-y-6 py-6">
      <ng-container *ngIf="attraction; else loading">
        <div class="rounded-2xl border border-neutral/10 bg-white p-6 shadow-sm">
          <div class="flex flex-col gap-2">
            <p class="text-xs uppercase tracking-wide text-neutral/50">Atracción</p>
            <h2 class="text-3xl font-semibold text-neutral">{{ attraction.name }}</h2>
            <p class="text-sm font-medium text-neutral/70">{{ attraction.type }}</p>
          </div>

          <p class="mt-4 text-sm text-neutral/70">{{ attraction.description }}</p>

          <div class="mt-6 grid gap-4 sm:grid-cols-2">
            <div class="rounded-xl border border-neutral/10 bg-neutral/5 p-4">
              <p class="text-xs uppercase tracking-wide text-neutral/50">Capacidad</p>
              <p class="mt-2 text-2xl font-semibold text-neutral">{{ attraction.capacity }}</p>
            </div>
            <div class="rounded-xl border border-neutral/10 bg-neutral/5 p-4">
              <p class="text-xs uppercase tracking-wide text-neutral/50">Edad mínima</p>
              <p class="mt-2 text-2xl font-semibold text-neutral">{{ attraction.minAge }}</p>
            </div>
          </div>
        </div>
      </ng-container>

      <ng-template #loading>
        <div class="rounded-2xl border border-dashed border-neutral/40 bg-white/80 p-6 text-center text-sm text-neutral/70 shadow-sm">
          Cargando detalles de la atracción…
        </div>
      </ng-template>
    </section>
