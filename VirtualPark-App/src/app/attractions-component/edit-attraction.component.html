
    <section class="form-container">
      <mat-card class="form-paper">
        <mat-card-header>
          <mat-card-title>Editar atracción</mat-card-title>
          <mat-card-subtitle>
            Actualiza los datos de la atracción. Los cambios se aplican inmediatamente.
          </mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <ng-container *ngIf="!isLoading(); else loader">
            <form [formGroup]="form" class="form-grid" (ngSubmit)="onSubmit()">
              <mat-form-field appearance="outline">
                <mat-label>Nombre</mat-label>
                <input matInput formControlName="name" />
                <mat-error *ngIf="f['name'].invalid && f['name'].touched">
                  Ingresa un nombre válido.
                </mat-error>
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Tipo</mat-label>
                <input matInput formControlName="type" />
                <mat-error *ngIf="f['type'].invalid && f['type'].touched">
                  El tipo es obligatorio.
                </mat-error>
              </mat-form-field>

              <mat-form-field appearance="outline">
                <mat-label>Descripción</mat-label>
                <textarea matInput rows="4" formControlName="description"></textarea>
              </mat-form-field>

              <div class="form-grid form-grid--two">
                <mat-form-field appearance="outline">
                  <mat-label>Capacidad</mat-label>
                  <input matInput type="number" formControlName="capacity" min="1" />
                  <mat-error *ngIf="f['capacity'].invalid && f['capacity'].touched">
                    La capacidad debe ser mayor a cero.
                  </mat-error>
                </mat-form-field>

                <mat-form-field appearance="outline">
                <mat-label>Edad mínima</mat-label>
                <input matInput type="number" formControlName="minAge" min="0" />
                  <mat-error *ngIf="f['minAge'].invalid && f['minAge'].touched">
                    Ingresa una edad válida.
                  </mat-error>
                </mat-form-field>
              </div>

              <div class="form-actions">
                <button mat-button type="button" (click)="goBack()" [disabled]="isSaving()">
                  Cancelar
                </button>
                <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || isSaving()">
                  {{ isSaving() ? 'Guardando...' : 'Guardar cambios' }}
                </button>
              </div>
            </form>
          </ng-container>

          <ng-template #loader>
            <div class="loader">
              <mat-progress-spinner diameter="48" mode="indeterminate"></mat-progress-spinner>
            </div>
          </ng-template>
        </mat-card-content>
      </mat-card>
    </section>
