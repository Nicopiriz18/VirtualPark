
    <section class="mx-auto max-w-3xl space-y-6 py-6">
      <ng-container *ngIf="user; else loading">
        <div class="rounded-2xl border border-neutral/10 bg-white p-6 shadow-sm">
          <div class="flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
            <div>
              <p class="text-sm uppercase tracking-wide text-neutral/60">Perfil del usuario</p>
              <h2 class="text-3xl font-semibold text-neutral">
                {{ user.name }} {{ user.surname }}
              </h2>
            </div>
            <div class="flex flex-wrap gap-2">
              <span
                *ngFor="let role of user.roles"
                class="rounded-full border border-neutral/30 px-3 py-1 text-xs font-semibold text-neutral"
              >
                {{ role }}
              </span>
            </div>
          </div>

          <div class="mt-5 grid gap-6 md:grid-cols-2">
            <div class="space-y-1 text-sm text-neutral/70">
              <p class="text-xs uppercase tracking-wide text-neutral/50">Correo electrónico</p>
              <p class="text-base text-neutral">{{ user.email }}</p>
            </div>
            <div class="space-y-1 text-sm text-neutral/70">
              <p class="text-xs uppercase tracking-wide text-neutral/50">Identificador</p>
              <p class="text-base text-neutral break-all">{{ user.id }}</p>
            </div>
          </div>

          <div class="mt-6 flex flex-wrap gap-3">
            <button
              *ngIf="isAdmin"
              class="rounded-lg bg-primary px-4 py-2 text-sm font-semibold text-white transition hover:bg-primary/90"
              (click)="editUser()"
            >
              Editar usuario
            </button>
            <button
              class="rounded-lg border border-neutral/20 px-4 py-2 text-sm font-semibold text-neutral transition hover:border-neutral/40"
              (click)="goBack()"
            >
              Volver al listado
            </button>
          </div>
        </div>
      </ng-container>

      <ng-template #loading>
        <div class="rounded-2xl border border-dashed border-neutral/40 bg-white/80 p-6 text-center text-sm text-neutral/70 shadow-sm">
          Cargando usuario…
        </div>
      </ng-template>
    </section>
